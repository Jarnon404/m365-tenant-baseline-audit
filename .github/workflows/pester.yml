name: Pester Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  repository-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester
        shell: pwsh
        run: Install-Module Pester -Scope CurrentUser -Force
      - name: Run tests
        shell: pwsh
        run: Invoke-Pester -Path ./tests -Output Detailed
