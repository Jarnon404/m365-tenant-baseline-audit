name: Public Safety Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  public-safety-check:
    name: public-safety-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Check for obvious private data placeholders
        shell: pwsh
        run: |
          $Patterns = @(
            ("real" + "-tenant-id"),
            ("customer" + ".local"),
            ("corp" + ".local"),
            ("tenant" + ".onmicrosoft.com"),
            ("password" + "="),
            ("client" + "_secret")
          )

          $ExcludedRelativePaths = @(
            ".github/workflows/public-safety-check.yml",
            "tests/Repository.Tests.ps1"
          )

          $RepoRoot = (Get-Location).Path

          $Files = Get-ChildItem -Path . -Recurse -File |
            Where-Object {
              $RelativePath = $_.FullName.Replace($RepoRoot, "").TrimStart("\","/").Replace("\","/")

              $_.FullName -notmatch "[\\/]\.git[\\/]" -and
              $_.Extension -in @(".ps1", ".md", ".json", ".yml", ".yaml", ".html", ".txt", "") -and
              $RelativePath -notin $ExcludedRelativePaths
            }

          $Hits = foreach ($File in $Files) {
            $Content = Get-Content $File.FullName -Raw -ErrorAction SilentlyContinue

            foreach ($Pattern in $Patterns) {
              if ($Content -match [regex]::Escape($Pattern)) {
                "$($File.FullName): $Pattern"
              }
            }
          }

          if ($Hits) {
            $Hits | ForEach-Object { Write-Host $_ }
            throw "Potential private data marker found."
          }

          Write-Host "No obvious private data markers found."
